version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: absensi-server
    environment:
      TURSO_DATABASE_URL: ${TURSO_DATABASE_URL:-file:./prisma/dev.db}
      TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-absensi-jwt-secret-2024-change-this}
      JWT_EXPIRES_IN: 30m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    volumes:
      - db_data:/app/server/prisma
    networks:
      - app-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: absensi-client
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: absensi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - server
      - client
    networks:
      - app-network
    restart: unless-stopped

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
